<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Underworld Browser Panel</title>
<style>
:root{--bg:#031013;--bg2:#06171c;--panel:#081b21;--panel2:#0b232a;--line:rgba(20,243,228,.16);--text:#c8fff9;--muted:#71ddd5;--faint:#2c7e7a;--accent:#19e4d5;--accent2:#43fff1;--danger:#ff6f91;--ok:#79ffa9;--shadow:0 0 0 1px rgba(20,243,228,.08),0 0 24px rgba(0,184,200,.12);--mono:ui-monospace, SFMono-Regular, Consolas, monospace;--sans:Inter,system-ui,sans-serif}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:radial-gradient(circle at top left, rgba(25,228,213,.12), transparent 20%),radial-gradient(circle at bottom right, rgba(0,184,200,.1), transparent 24%),linear-gradient(rgba(10,36,40,.24) 1px, transparent 1px),linear-gradient(90deg, rgba(10,36,40,.2) 1px, transparent 1px),var(--bg);background-size:auto,auto,28px 28px,28px 28px;color:var(--text);font-family:var(--sans);overflow:hidden}
body::before{content:"";position:fixed;inset:0;background:linear-gradient(180deg, rgba(20,243,228,.04), transparent 20%, transparent 80%, rgba(20,243,228,.03));pointer-events:none}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(180deg, rgba(255,255,255,.015) 0 2px, transparent 2px 4px);opacity:.16;pointer-events:none}
canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;opacity:.25}
.shell{position:relative;z-index:1;display:grid;grid-template-columns:280px 1fr;min-height:100vh}
.side{background:rgba(5,18,22,.93);border-right:1px solid var(--line);padding:22px;display:flex;flex-direction:column;gap:18px;backdrop-filter:blur(10px)}
.brand{font-family:var(--mono);text-transform:uppercase;letter-spacing:.18em;color:var(--accent)}
.badge{padding:6px 10px;border:1px solid var(--line);border-radius:999px;font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);display:inline-flex;align-self:flex-start;background:rgba(8,27,33,.9)}
.main{padding:20px;overflow:auto}
.top{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:14px 16px;border:1px solid var(--line);border-radius:18px;background:rgba(8,27,33,.88);box-shadow:var(--shadow);margin-bottom:18px}
.title{font:800 clamp(26px,3vw,44px)/1 var(--sans);text-transform:uppercase;letter-spacing:.05em;margin:0;color:var(--accent)}
.sub{margin:6px 0 0;color:var(--muted)}
.grid{display:grid;gap:16px}.cols-2{grid-template-columns:1.2fr .8fr}.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.card{border:1px solid var(--line);border-radius:18px;background:rgba(8,27,33,.92);box-shadow:var(--shadow);padding:18px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg, transparent, rgba(25,228,213,.04), transparent);animation:sweep 8s linear infinite}
.card>*{position:relative;z-index:1}
@keyframes sweep{from{transform:translateX(-100%)}to{transform:translateX(180%)}}
h2,h3{margin:0 0 10px;text-transform:uppercase;letter-spacing:.06em}
.mono{font-family:var(--mono)}
input,textarea{width:100%;border-radius:14px;border:1px solid var(--line);background:rgba(11,35,42,.96);color:var(--text);padding:14px 15px;font-family:var(--mono);outline:none}
textarea{min-height:104px;resize:vertical}
label{display:block;margin:0 0 8px;font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
button.primary,button.secondary{border-radius:14px;padding:12px 14px;border:1px solid var(--line);cursor:pointer;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em}
.primary{background:linear-gradient(180deg, rgba(25,228,213,.18), rgba(10,122,116,.24));color:var(--text)}
.secondary{background:rgba(8,27,33,.9);color:var(--muted)}
.list{display:grid;gap:10px;max-height:420px;overflow:auto;padding-right:4px}
.item{padding:14px;border:1px solid var(--line);border-radius:14px;background:rgba(11,35,42,.92)}
.item strong{display:block;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:4px}
.small{font-size:12px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em}
.hidden{display:none !important}
.tabs{display:flex;gap:10px;flex-wrap:wrap}
.tabs button{border:1px solid var(--line);background:rgba(8,27,33,.88);color:var(--muted);padding:9px 12px;border-radius:999px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;cursor:pointer}
.tabs button.active{color:var(--text);border-color:rgba(20,243,228,.24);background:rgba(25,228,213,.08)}
.statusPill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;font-size:12px}
.statusDot{width:8px;height:8px;border-radius:50%}
.statusPending{background:rgba(255,209,102,.08);color:#ffd978}
.statusPending .statusDot{background:#ffd978}
.statusApproved{background:rgba(121,255,169,.08);color:#99ffbf}
.statusApproved .statusDot{background:#99ffbf}
.statusRevoked{background:rgba(255,111,145,.08);color:#ff9bb3}
.statusRevoked .statusDot{background:#ff9bb3}
.notice{padding:14px;border-radius:14px;background:rgba(25,228,213,.08);border:1px solid rgba(20,243,228,.16);font-family:var(--mono);color:var(--muted)}
.toast{padding:14px 16px;border-radius:14px;border:1px solid rgba(20,243,228,.22);background:rgba(4,16,19,.96);box-shadow:0 0 24px rgba(25,228,213,.16);font-family:var(--mono);color:var(--text);min-width:260px;max-width:320px;opacity:0;transform:translateY(-8px);animation:toastIn .25s forwards, toastOut .35s ease 4.2s forwards}
.toast strong{display:block;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
@keyframes toastIn{to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}
.split{display:grid;grid-template-columns:1fr 320px;gap:16px}
.authOverlay{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:rgba(1,8,10,.82);backdrop-filter:blur(12px)}
.panelAuth{width:min(1100px,calc(100vw - 28px));border:1px solid rgba(20,243,228,.24);background:rgba(4,16,19,.96);box-shadow:0 0 34px rgba(25,228,213,.12);border-radius:18px;padding:22px}
@media (max-width:1100px){body{overflow:auto}.shell{grid-template-columns:1fr}.side{position:static}.split,.cols-2,.cols-3,.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="toastContainer" style="position:fixed;top:18px;right:18px;z-index:9999;display:grid;gap:10px;pointer-events:none"></div>
<canvas id="rain"></canvas>

<div class="authOverlay" id="auth">
  <div class="panelAuth">
    <div class="badge">Browser admin access</div>
    <h2 class="title" style="margin-top:10px">Two sign-ins</h2>
    <p class="sub">Players sign in with a player account. Admins sign in separately to manage approvals and access.</p>

    <div class="tabs" style="margin-top:16px">
      <button class="active" data-auth-tab="player">Player sign in</button>
      <button
